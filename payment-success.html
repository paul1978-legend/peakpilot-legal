<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — PeakPilot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F4F6F8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 36px;
    text-align: center;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .icon { font-size: 64px; margin-bottom: 24px; }
  h1 { font-size: 28px; font-weight: 800; color: #111; margin-bottom: 12px; }
  p { font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 32px; }
  .badge {
    display: inline-block;
    background: #F59E0B;
    color: #111;
    font-weight: 800;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .instruction {
    background: #EFF6FF;
    border-radius: 12px;
    padding: 16px;
    font-size: 14px;
    color: #2D8CFF;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>You're now Premium!</h1>
    <div class="badge">⭐ PeakPilot Premium</div>
    <p>Your subscription is active. You now have access to AI weekly plans, advanced streak tracking, and priority recommendations.</p>
    <div class="instruction">
      Return to the PeakPilot app to start using your Premium features.
    </div>
  </div>
</body>
</html>
