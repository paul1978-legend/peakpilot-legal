<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Cancelled — PeakPilot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F4F6F8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 36px;
    text-align: center;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .icon { font-size: 64px; margin-bottom: 24px; }
  h1 { font-size: 28px; font-weight: 800; color: #111; margin-bottom: 12px; }
  p { font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 32px; }
  .instruction {
    background: #F0F2F5;
    border-radius: 12px;
    padding: 16px;
    font-size: 14px;
    color: #666;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">😔</div>
    <h1>Payment Cancelled</h1>
    <p>No worries — you can upgrade to Premium anytime from within the PeakPilot app.</p>
    <div class="instruction">
      Return to the PeakPilot app to continue your free workout journey.
    </div>
  </div>
</body>
</html>
